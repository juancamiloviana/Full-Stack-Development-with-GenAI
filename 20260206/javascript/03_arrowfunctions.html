<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Normal Style Function
        function display1() {
            document.write("<br/> Normal Style Function");
        }
        display1();

        // Expression Style Function
        let display2 = function() {
            document.write("<br/> Expression Style Function");
        }
        display2();

        // **Arrow Function**

        // Example 1: No parameter and no return type
        let display3 = () => {
            document.write("<br/> Arrow Function");
        }
        display3();

        // Example 2: With parameter and with return type
        let addNumber2 = (a, b) => a+b;
        document.write("<br/> Sum of two numbers is (arrow function): " + addNumber2(10, 20));

        // Example 3: With parameter and with return type    
        let findlargest = (a,b) => {
            if (a > b) {
                return a;
            } else {
                return b;
            }
        }
        document.write("<br/> Largest number is: " + findlargest(10, 20));
    </script>
</body>
</html>
